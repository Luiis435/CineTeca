<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineTeca Pro</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB46-sCSiJ1HSMARLY1aBgECu2yxnOKYSQ",
            authDomain: "cineteca-8f89c.firebaseapp.com",
            projectId: "cineteca-8f89c",
            storageBucket: "cineteca-8f89c.firebasestorage.app",
            messagingSenderId: "944562373253",
            appId: "1:944562373253:web:1ba79111e58d2ec44e5fec"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentProfile = JSON.parse(localStorage.getItem('ct_profile')) || null;
        let allMovies = [];

        const tudum = new Audio('https://www.myinstants.com/media/sounds/netflix-tudum.mp3');

        window.handleAuth = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const btn = document.querySelector('.btn-main');

            if (!email || !pass) return alert("Por favor, preencha todos os campos.");

            btn.innerText = "Carregando...";
            btn.disabled = true;

            const q = query(collection(db, "usuarios"), where("email", "==", email), where("pass", "==", pass));
            const snap = await getDocs(q);

            if (!snap.empty || (email === "admin" && pass === "123")) {
                tudum.play();
                sessionStorage.setItem('ct_logged', 'true');
                window.showProfileSelection();
            } else { 
                alert("Dados incorretos."); 
                btn.innerText = "Entrar";
                btn.disabled = false;
            }
        };

        window.showProfileSelection = () => {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('profile-screen').style.display = 'flex';
            document.body.classList.remove('kids-theme'); // Reset cor ao voltar para perfis
        };

        window.selectProfile = (name, mode) => {
            tudum.play();
            currentProfile = { name, mode };
            localStorage.setItem('ct_profile', JSON.stringify(currentProfile));
            startApp();
        };

        function startApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('profile-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('user-name-display').innerText = currentProfile.name;
            
            // APLICA O TEMA AZUL SE FOR KIDS
            if (currentProfile.mode === 'kids') {
                document.body.classList.add('kids-theme');
            } else {
                document.body.classList.remove('kids-theme');
            }
            loadMovies();
        }

        function loadMovies() {
            const q = query(collection(db, "videos"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snap) => {
                allMovies = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderMovies(allMovies);
            });
        }

        window.renderMovies = (movies, title = "Populares") => {
            const grid = document.getElementById('movie-grid');
            document.getElementById('row-title').innerText = title;
            grid.innerHTML = movies.map(m => `
                <div class="movie-card" onclick="playVideo('${m.url}')">
                    <img src="${m.thumb}">
                    <div class="movie-info">${m.titulo || 'Sem título'}</div>
                </div>
            `).join('');
        };

        window.playVideo = (url) => {
            let embedUrl = url;
            if (url.includes('v=')) embedUrl = `https://www.youtube.com/embed/${url.split('v=')[1].split('&')[0]}?autoplay=1`;
            document.getElementById('player-target').innerHTML = `<iframe src="${embedUrl}" allowfullscreen allow="autoplay"></iframe>`;
            document.getElementById('player-modal').style.display = 'flex';
        };

        window.closePlayer = () => {
            document.getElementById('player-modal').style.display = 'none';
            document.getElementById('player-target').innerHTML = '';
        };

        window.toggleSidebar = () => {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('sidebar-overlay').classList.toggle('active');
        };

        window.onload = () => {
            if(sessionStorage.getItem('ct_logged') && currentProfile) startApp();
            else if(sessionStorage.getItem('ct_logged')) window.showProfileSelection();
            setTimeout(() => document.getElementById('loading-screen').classList.add('fade-out'), 2000);
        };
    </script>

    <style>
        :root { --primary: #E50914; --bg: #000000; --kids: #00A8E1; --input-bg: #333333; }
        
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; transition: background 0.5s ease; }

        /* TEMA KIDS AZUL */
        body.kids-theme { background: #001e3c; }
        body.kids-theme .logo-text { color: var(--kids); }
        body.kids-theme .btn-main { background: var(--kids); }
        body.kids-theme #sidebar { background: #001224; }

        /* LOGIN PROFISSIONAL */
        #auth-screen {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://assets.nflxext.com/ffe/siteui/vlv3/f841d4c7-10e1-40af-bca1-07e3f8eb14af/61661664-5a3c-4e8c-986b-f472855146c6/BR-pt-20220502-popsignuptwoweeks-perspective_alpha_website_medium.jpg');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .login-card { width: 100%; max-width: 400px; background: rgba(0, 0, 0, 0.75); padding: 40px 30px; border-radius: 8px; }
        .input-group input { width: 100%; padding: 16px; background: var(--input-bg); border: none; border-radius: 5px; color: white; margin-bottom: 15px; font-size: 1rem; }
        .btn-main { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 1.1rem; cursor: pointer; }

        /* PERFIS */
        #profile-screen { display:none; flex-direction:column; align-items:center; justify-content:center; height:100vh; background: #000;}
        .profile-box { width: 110px; height: 110px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: bold; cursor: pointer; }

        /* HEADER & GRID */
        header { padding: 12px 20px; display: flex; align-items: center; background: rgba(0,0,0,0.95); position: sticky; top: 0; z-index: 1000; justify-content: space-between;}
        .logo-text { color: var(--primary); font-weight: 900; font-size: 1.5rem; letter-spacing: -1px; transition: 0.3s; }
        .movie-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .movie-card { border-radius: 4px; overflow: hidden; background: #1a1a1a; }
        .movie-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; }
        .movie-info { padding: 8px; font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* SIDEBAR */
        #sidebar { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: #000; z-index: 5000; transition: 0.3s; padding: 25px; }
        #sidebar.active { left: 0; }
        #sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 4999; display: none; }
        #sidebar-overlay.active { display: block; }

        /* UTILS */
        #loading-screen { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; transition: 0.8s; }
        .fade-out { opacity: 0; visibility: hidden; }
        #player-modal { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; z-index: 9000; }
    </style>
</head>
<body>

    <div id="loading-screen"><h1 class="logo-text" style="font-size: 3.5rem;">CINETECA</h1></div>

    <div id="auth-screen">
        <div class="logo-text" style="position: absolute; top: 25px; left: 25px; font-size: 2rem;">CINETECA</div>
        <div class="login-card">
            <h1 style="margin-top: 0;">Entrar</h1>
            <div class="input-group">
                <input type="email" id="email" placeholder="Email ou usuário">
                <input type="password" id="pass" placeholder="Senha">
            </div>
            <button class="btn-main" onclick="handleAuth()">Entrar</button>
        </div>
    </div>

    <div id="profile-screen">
        <h2 style="margin-bottom:40px; font-size: 1.8rem;">Quem está assistindo?</h2>
        <div style="display:flex; gap:25px">
            <div onclick="selectProfile('Adulto', 'adult')" style="text-align:center">
                <div class="profile-box" style="background:var(--primary);">A</div>
                <p style="color:#888; margin-top:10px">Adulto</p>
            </div>
            <div onclick="selectProfile('Kids', 'kids')" style="text-align:center">
                <div class="profile-box" style="background:var(--kids);">K</div>
                <p style="color:#888; margin-top:10px">Kids</p>
            </div>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <header>
            <div onclick="toggleSidebar()" style="font-size:1.5rem; cursor:pointer">☰</div>
            <div class="logo-text">CINETECA</div>
            <div id="user-name-display" style="font-size:0.8rem; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 20px;"></div>
        </header>
        <h3 id="row-title" style="margin: 20px 15px 10px; font-weight: 500; color: #eee;"></h3>
        <div class="movie-grid" id="movie-grid"></div>
    </div>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div id="sidebar">
        <div class="logo-text" style="margin-bottom: 35px;">CINETECA</div>
        <div style="padding: 15px 0; border-bottom: 1px solid #222;" onclick="location.reload()">Início</div>
        <div style="padding: 15px 0; border-bottom: 1px solid #222;" onclick="showProfileSelection()">Trocar Perfil</div>
        <div style="padding: 15px 0; color: var(--primary);" onclick="sessionStorage.clear(); location.reload()">Sair</div>
    </div>

    <div id="player-modal">
        <div onclick="closePlayer()" style="padding:20px; font-weight:bold; cursor:pointer">✕ VOLTAR</div>
        <div id="player-target" style="flex-grow:1"></div>
    </div>

</body>
</html>
