<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineTeca Premium</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, where, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB46-sCSiJ1HSMARLY1aBgECu2yxnOKYSQ",
            authDomain: "cineteca-8f89c.firebaseapp.com",
            projectId: "cineteca-8f89c",
            storageBucket: "cineteca-8f89c.firebasestorage.app",
            messagingSenderId: "944562373253",
            appId: "1:944562373253:web:1ba79111e58d2ec44e5fec"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let currentProfile = JSON.parse(localStorage.getItem('ct_profile')) || null;
        let allVideos = [];
        let currentFilter = 'todos';
        let progressInterval;

        onAuthStateChanged(auth, (user) => {
            if (user && user.emailVerified) {
                document.getElementById('auth-screen').style.display = 'none';
                if(!currentProfile) showProfileSelection();
                else selectProfile(currentProfile.name, currentProfile.type);
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-content').style.display = 'none';
            }
        });

        async function saveProgress(videoId, currentTime, duration, videoData) {
            if (!auth.currentUser || !currentProfile || !videoId || !duration) return;
            const percent = (currentTime / duration) * 100;
            const progressRef = doc(db, "users", auth.currentUser.uid, "profiles", currentProfile.name, "progress", videoId);

            if (percent > 95) {
                await deleteDoc(progressRef); 
            } else {
                await setDoc(progressRef, {
                    videoId, time: currentTime, percent: percent, updatedAt: new Date(), ...videoData
                });
            }
        }

        function renderContinueWatching() {
            if (!auth.currentUser || !currentProfile) return;
            const q = query(collection(db, "users", auth.currentUser.uid, "profiles", currentProfile.name, "progress"), orderBy("updatedAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById('continue-watching');
                if (snapshot.empty) { container.innerHTML = ""; return; }
                const items = snapshot.docs.map(doc => doc.data());
                container.innerHTML = `<div class="category-section"><h2 class="category-title">Continuar Assistindo</h2><div class="movie-row">
                    ${items.map(v => `<div class="movie-card" onclick="openLoadingScreen('${v.url}', '${v.videoType}', '${v.thumb}', '${v.title}', '${v.videoId}', ${v.time})">
                        <div class="poster-wrapper"><img src="${v.thumb}"><div class="progress-bar-container"><div class="progress-bar-fill" style="width:${v.percent}%"></div></div></div>
                        <div class="movie-info"><h3>${v.title}</h3></div></div>`).join('')}</div></div>`;
            });
        }

        window.handleAuth = async (mode) => {
            const email = document.getElementById(mode === 'signup' ? 'reg-email' : 'auth-email').value;
            const pass = document.getElementById(mode === 'signup' ? 'reg-pass' : 'auth-pass').value;
            try {
                if(mode === 'signup') {
                    const cred = await createUserWithEmailAndPassword(auth, email, pass);
                    await sendEmailVerification(cred.user); alert("Verifique seu e-mail!");
                } else {
                    const cred = await signInWithEmailAndPassword(auth, email, pass);
                    if(!cred.user.emailVerified) { alert("E-mail não verificado!"); signOut(auth); }
                }
            } catch (e) { alert("Erro: " + e.message); }
        };

        window.selectProfile = (name, type) => {
            currentProfile = { name, type };
            localStorage.setItem('ct_profile', JSON.stringify(currentProfile));
            document.getElementById('profile-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('current-user-img').innerText = name[0].toUpperCase();
            renderLibrary(type);
        };

        window.logout = () => { signOut(auth); localStorage.removeItem('ct_profile'); location.reload(); };
        window.toggleSettings = () => { document.getElementById('side-menu').classList.toggle('active'); document.getElementById('menu-overlay').classList.toggle('active'); };
        window.showProfileSelection = () => { document.getElementById('profile-screen').style.display = 'flex'; document.getElementById('app-content').style.display = 'none'; };

        function renderLibrary(type) {
            renderContinueWatching();
            let q = query(collection(db, "videos"), orderBy("createdAt", "desc"));
            if (type === 'infantil') q = query(collection(db, "videos"), where("rating", "==", "infantil"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                allVideos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                displayVideos(allVideos);
            });
        }

        function displayVideos(list) {
            const shelf = document.getElementById('shelf');
            shelf.innerHTML = "";
            let filteredList = currentFilter === 'todos' ? list : list.filter(v => v.mediaType === currentFilter);
            const groups = filteredList.reduce((acc, v) => {
                const g = v.genre || "Geral"; if (!acc[g]) acc[g] = []; acc[g].push(v); return acc;
            }, {});
            for (const genre in groups) {
                shelf.innerHTML += `<div class="category-section"><h2 class="category-title">${genre}</h2><div class="movie-row">
                    ${groups[genre].map(v => `<div class="movie-card" onclick="openLoadingScreen('${v.url}', '${v.videoType}', '${v.thumb}', '${v.title}', '${v.id}')">
                        <div class="poster-wrapper"><img src="${v.thumb}"></div><div class="movie-info"><h3>${v.title}</h3></div></div>`).join('')}</div></div>`;
            }
        }

        window.searchVideos = (term) => {
            const filtered = allVideos.filter(v => v.title.toLowerCase().includes(term.toLowerCase()));
            displayVideos(filtered);
        };

        window.openLoadingScreen = async (url, type, thumb, title, videoId, startTime = 0) => {
            const loader = document.getElementById('loadingScreen');
            const bg = document.getElementById('load-bg');
            const poster = document.getElementById('load-poster');
            const percText = document.getElementById('load-perc');
            const titleText = document.getElementById('load-title');
            const playerModal = document.getElementById('playerModal');
            const target = document.getElementById('playerTarget');

            target.innerHTML = "";
            bg.style.backgroundImage = `url(${thumb})`;
            poster.src = thumb;
            titleText.innerText = title;
            percText.innerText = "0%";
            
            playerModal.style.display = 'flex';
            loader.classList.remove('loader-hidden');
            loader.style.display = 'flex';

            let progress = 0;
            const sim = setInterval(() => { if (progress < 90) { progress += 10; percText.innerText = progress + "%"; } }, 100);

            const finalizeOpening = async () => {
                clearInterval(sim);
                percText.innerText = "100%";
                
                setTimeout(() => { loader.classList.add('loader-hidden'); }, 300);

                setTimeout(async () => {
                    try {
                        if (playerModal.requestFullscreen) await playerModal.requestFullscreen();
                        else if (playerModal.webkitRequestFullscreen) await playerModal.webkitRequestFullscreen();
                        
                        setTimeout(async () => {
                            if (screen.orientation && screen.orientation.lock) {
                                await screen.orientation.lock('landscape').catch(() => {});
                            }
                        }, 600);
                    } catch (e) { console.error(e); }
                }, 800);
            };

            if (type === 'file' || url.includes('.mp4')) {
                const video = document.createElement('video');
                video.className = "video-render";
                video.src = url; video.controls = true; video.autoplay = true; video.playsInline = true;
                video.currentTime = startTime;
                video.onplay = () => {
                    if (!progressInterval) {
                        progressInterval = setInterval(() => {
                            saveProgress(videoId, video.currentTime, video.duration, {url, videoType: type, thumb, title});
                        }, 5000);
                    }
                    finalizeOpening();
                };
                target.appendChild(video);
                video.play().catch(() => finalizeOpening());
            } else {
                let finalUrl = url;
                if (url.includes("youtube.com/watch?v=")) finalUrl = `https://www.youtube.com/embed/${url.split("v=")[1].split("&")[0]}`;
                else if (url.includes("youtu.be/")) finalUrl = `https://www.youtube.com/embed/${url.split("/").pop().split("?")[0]}`;
                
                target.innerHTML = `<iframe id="yt-player" src="${finalUrl}?autoplay=1&start=${Math.floor(startTime)}&rel=0&enablejsapi=1&origin=${window.location.origin}" frameborder="0" allow="autoplay; fullscreen" style="width:100%; height:100%;"></iframe>`;
                target.querySelector('iframe').onload = finalizeOpening;
            }
        };

        window.closePlayer = () => { 
            clearInterval(progressInterval);
            if (document.fullscreenElement) document.exitFullscreen().catch(()=>{});
            if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock().catch(()=>{});
            document.getElementById('playerModal').style.display = 'none'; 
            document.getElementById('playerTarget').innerHTML = ''; 
        };

        window.setFilter = (t) => { 
            currentFilter = t; 
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); 
            event.target.classList.add('active'); 
            displayVideos(allVideos); 
        };
        window.signInWithPopup = (a, p) => signInWithPopup(a, p);
    </script>

    <style>
        :root { --accent: #E50914; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; overflow-x: hidden; width: 100%; height: 100%; }

        /* Loader */
        #loadingScreen { 
            position: absolute; inset: 0; z-index: 2005; display: none; 
            background: #000; flex-direction: column; align-items: center; justify-content: center; 
            transition: opacity 0.5s ease;
        }
        .loader-hidden { opacity: 0; pointer-events: none; }
        #load-bg { position: absolute; inset: 0; background-size: cover; background-position: center; filter: blur(40px) brightness(0.3); z-index: -1; transform: scale(1.1); }
        #load-poster { max-height: 50vh; width: auto; aspect-ratio: 2/3; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .netflix-loader { width: 45px; height: 45px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* UI Base */
        #auth-screen { min-height: 100vh; display: flex; justify-content: center; align-items: center; background: #111; }
        .auth-box { width: 100%; max-width: 380px; background: rgba(0,0,0,0.8); padding: 40px; border-radius: 8px; }
        input { width: 100%; height: 50px; background: #333; border: none; color: white; padding: 0 15px; margin-bottom: 15px; border-radius: 4px; }
        .btn-red { width: 100%; height: 50px; background: var(--accent); color: white; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; }
        
        header { padding: 15px 5%; display: flex; flex-direction: column; position: fixed; width: 100%; z-index: 100; background: linear-gradient(to bottom, rgba(0,0,0,1), transparent); gap: 15px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; }
        .search-container { flex: 1; max-width: 300px; position: relative; margin: 0 15px; }
        .search-input { width: 100%; height: 32px; background: rgba(255,255,255,0.15); border-radius: 20px; padding: 0 35px; color: white; border: none; font-size: 13px; }
        .user-btn { width: 32px; height: 32px; background: #1e88e5; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; }

        .filter-bar { display: flex; gap: 15px; }
        .filter-btn { background: none; border: none; color: #aaa; cursor: pointer; font-size: 0.9rem; font-weight: 600; border-bottom: 2px solid transparent; padding-bottom: 5px; }
        .filter-btn.active { color: white; border-bottom-color: var(--accent); }

        .hero { padding: 140px 0 20px; }
        .category-section { margin-bottom: 25px; }
        .category-title { margin: 0 5% 10px; font-size: 1.1rem; font-weight: 700; }
        .movie-row { display: flex; overflow-x: auto; gap: 12px; padding: 0 5%; scrollbar-width: none; }
        .movie-card { min-width: 130px; cursor: pointer; transition: transform 0.3s; }
        .movie-card:hover { transform: scale(1.05); }
        .poster-wrapper { width: 100%; aspect-ratio: 2/3; border-radius: 4px; overflow: hidden; background: #222; position: relative; }
        .poster-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .progress-bar-container { position: absolute; bottom: 0; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.2); }
        .progress-bar-fill { height: 100%; background: var(--accent); }
        .movie-info h3 { font-size: 0.75rem; margin-top: 6px; color: #ccc; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* PLAYER MODAL - CORREÇÃO DE TELA PRETA */
        #playerModal {
            background: #000 !important;
            display: none;
            position: fixed;
            top: 0 !important;
            left: 0 !important;
            right: 0 !important;
            bottom: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            z-index: 9999;
        }
        #playerTarget {
            width: 100% !important;
            height: 100% !important;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        #playerTarget iframe, .video-render {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            border: none;
            object-fit: contain;
            background: black;
        }
        .close-p { position: absolute; top: 20px; right: 20px; font-size: 2.5rem; z-index: 2010; cursor: pointer; color: white; text-shadow: 0 0 15px rgba(0,0,0,1); opacity: 0.7; }

        .side-menu { position: fixed; right: -300px; top: 0; width: 280px; height: 100%; background: #181818; z-index: 1000; transition: 0.4s; padding: 40px 25px; }
        .side-menu.active { right: 0; }
        #menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 900; display: none; }
        #menu-overlay.active { display: block; }
        #profile-screen { height: 100vh; display: none; flex-direction: column; justify-content: center; align-items: center; background: #000; }
        .avatar-lg { width: 110px; height: 110px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin-bottom: 10px; cursor: pointer; border: 3px solid transparent; }
        .avatar-lg:hover { border-color: white; }
    </style>
</head>
<body>

    <div id="menu-overlay" onclick="toggleSettings()"></div>
    <div class="side-menu" id="side-menu">
        <div style="font-size: 1.5rem; margin-bottom: 20px;" onclick="toggleSettings()">✕</div>
        <div onclick="showProfileSelection(); toggleSettings()">🔄 Mudar Perfil</div>
        <div style="color: var(--accent); margin-top: 30px;" onclick="logout()">🚪 Sair da Conta</div>
    </div>

    <div id="auth-screen">
        <div class="auth-box" id="login-sec">
            <h1>Entrar</h1>
            <input type="email" id="auth-email" placeholder="E-mail">
            <input type="password" id="auth-pass" placeholder="Senha">
            <button class="btn-red" onclick="handleAuth('login')">ENTRAR</button>
            <button onclick="signInWithPopup(auth, provider)" style="width:100%; margin-top:10px; height:50px; background: white; color: black; border: none; font-weight: bold; border-radius: 4px; cursor: pointer;">GOOGLE</button>
        </div>
    </div>

    <div id="profile-screen">
        <h1>Quem está a ver?</h1>
        <div style="display:flex; gap:20px; margin-top:30px">
            <div onclick="selectProfile('Luis', 'adulto')"><div class="avatar-lg" style="background:#1e88e5">👤</div><p>Luis</p></div>
            <div onclick="selectProfile('Kids', 'infantil')"><div class="avatar-lg" style="background:#ffca28">🐣</div><p>Kids</p></div>
        </div>
    </div>

    <div id="app-content" style="display: none;">
        <header>
            <div class="top-bar"><div style="color:var(--accent); font-weight:900; font-size:1.5rem">C</div>
                <div class="search-container"><input type="text" class="search-input" placeholder="Procurar..." oninput="searchVideos(this.value)"></div>
                <div class="user-btn" id="current-user-img" onclick="toggleSettings()">?</div>
            </div>
            <div class="filter-bar">
                <button class="filter-btn active" onclick="setFilter('todos')">Tudo</button>
                <button class="filter-btn" onclick="setFilter('filme')">Filmes</button>
                <button class="filter-btn" onclick="setFilter('serie')">Séries</button>
            </div>
        </header>
        <div class="hero"><div id="continue-watching"></div><main id="shelf"></main></div>
    </div>

    <div id="playerModal" class="modal">
        <div class="close-p" onclick="closePlayer()">✕</div>
        <div id="loadingScreen">
            <div id="load-bg"></div>
            <div class="load-content" style="text-align: center; z-index: 10;">
                <img id="load-poster" src=""><h2 id="load-title">Carregando...</h2>
                <div class="netflix-loader"></div><div id="load-perc">0%</div>
            </div>
        </div>
        <div id="playerTarget"></div>
    </div>

</body>
</html>
