<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Briques & Finanças | Dashboard Profissional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #000000;
            --bg-card: #0a0a0a;
            --accent-green: #50C878;
            --accent-red: #FF4D4D;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border: #1a1a1a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- TELA DE LOGIN --- */
        #login-screen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top right, rgba(80, 200, 120, 0.1), transparent);
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 50px;
            border-radius: 20px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .login-card h1 {
            font-family: 'Urbanist', sans-serif;
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--accent-green);
        }

        .login-card p { color: var(--text-dim); margin-bottom: 30px; font-size: 0.9rem; }

        input, select {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent-green); }

        .btn-primary {
            width: 100%;
            padding: 15px;
            background: var(--accent-green);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Urbanist', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(80, 200, 192, 0.3); }

        /* --- APP PRINCIPAL --- */
        #app-screen { display: none; }

        header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        /* Dashboard KPIs */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 16px;
            transition: 0.3s;
        }

        .kpi-card:hover { border-color: var(--accent-green); }

        .kpi-card h3 { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .kpi-card .value { font-size: 2.2rem; font-weight: 700; margin: 10px 0; font-family: 'Urbanist', sans-serif; }
        
        .value.gain { color: var(--accent-green); }
        .value.loss { color: var(--accent-red); }

        /* Seção Principal */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } }

        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 30px;
        }

        .panel h2 { font-family: 'Urbanist', sans-serif; margin-bottom: 25px; border-left: 4px solid var(--accent-green); padding-left: 15px; }

        /* Tabela Profissional */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 15px; color: var(--accent-green); font-size: 0.8rem; text-transform: uppercase; border-bottom: 2px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.95rem; }

        .badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge-venda { background: rgba(80, 200, 120, 0.1); color: var(--accent-green); border: 1px solid var(--accent-green); }
        .badge-compra { background: rgba(255, 77, 77, 0.1); color: var(--accent-red); border: 1px solid var(--accent-red); }
        .badge-troca { background: rgba(100, 149, 237, 0.1); color: #6495ED; border: 1px solid #6495ED; }

        .btn-delete {
            background: none;
            border: none;
            color: #444;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-delete:hover { color: var(--accent-red); }

        .logout-link { color: var(--text-dim); text-decoration: none; font-size: 0.9rem; cursor: pointer; }
        .logout-link:hover { color: var(--accent-green); }

    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1>B&F</h1>
            <p>Gerenciador Privado de Ativos</p>
            <input type="text" id="username" placeholder="Usuário">
            <input type="password" id="password" placeholder="Senha">
            <button class="btn-primary" onclick="handleLogin()">Acessar Painel</button>
            <p id="error-msg" style="color: var(--accent-red); margin-top: 15px; display: none;">Credenciais Inválidas</p>
        </div>
    </div>

    <div id="app-screen">
        <header>
            <div style="font-family: 'Urbanist'; font-weight: 700; font-size: 1.5rem;">
                BRIQUES <span style="color: var(--accent-green);">&</span> FINANÇAS
            </div>
            <div>
                <span id="user-display" style="margin-right: 20px; font-weight: 500;"></span>
                <a class="logout-link" onclick="logout()">Sair <i class="fa-solid fa-right-from-bracket"></i></a>
            </div>
        </header>

        <div class="container">
            <div class="dashboard">
                <div class="kpi-card">
                    <h3>Total em Vendas</h3>
                    <div class="value gain" id="dash-lucro">R$ 0,00</div>
                    <div style="color: var(--text-dim); font-size: 0.8rem;">Entrada de Capital</div>
                </div>
                <div class="kpi-card">
                    <h3>Custos de Compra</h3>
                    <div class="value loss" id="dash-perda">R$ 0,00</div>
                    <div style="color: var(--text-dim); font-size: 0.8rem;">Saída de Capital</div>
                </div>
                <div class="kpi-card" id="saldo-container">
                    <h3>Saldo Líquido</h3>
                    <div class="value" id="dash-saldo">R$ 0,00</div>
                    <div style="color: var(--text-dim); font-size: 0.8rem;">Resultado Consolidado</div>
                </div>
            </div>

            <div class="main-grid">
                <div class="panel">
                    <h2>Nova Operação</h2>
                    <form id="finance-form" onsubmit="addTransaction(event)">
                        <label style="color: var(--text-dim); font-size: 0.8rem;">TIPO DE NEGÓCIO</label>
                        <select id="tipo">
                            <option value="Venda">Venda (Ganho)</option>
                            <option value="Compra">Compra (Gasto)</option>
                            <option value="Troca">Brique (Troca)</option>
                        </select>

                        <label style="color: var(--text-dim); font-size: 0.8rem;">DESCRIÇÃO DO ATIVO</label>
                        <input type="text" id="desc" placeholder="Ex: Moto Honda, Notebook..." required>

                        <label style="color: var(--text-dim); font-size: 0.8rem;">VALOR DA OPERAÇÃO (R$)</label>
                        <input type="number" id="val" step="0.01" placeholder="0.00" required>

                        <button type="submit" class="btn-primary">Registrar Ativo</button>
                    </form>
                </div>

                <div class="panel">
                    <h2>Histórico de Ativos</h2>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Status</th>
                                    <th>Descrição</th>
                                    <th>Valor</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody id="table-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÕES DE USUÁRIO (Defina aqui seu login único)
        const MY_USER = "admin";
        const MY_PASS = "1234";

        let db = JSON.parse(localStorage.getItem('bf_data')) || [];

        function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            if(u === MY_USER && p === MY_PASS) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                document.getElementById('user-display').innerText = `Mestre: ${u}`;
                render();
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        }

        function logout() {
            location.reload();
        }

        function addTransaction(e) {
            e.preventDefault();
            const transaction = {
                id: Date.now(),
                tipo: document.getElementById('tipo').value,
                desc: document.getElementById('desc').value,
                val: parseFloat(document.getElementById('val').value)
            };
            db.push(transaction);
            save();
            render();
            e.target.reset();
        }

        function deleteItem(id) {
            db = db.filter(item => item.id !== id);
            save();
            render();
        }

        function save() {
            localStorage.setItem('bf_data', JSON.stringify(db));
        }

        function render() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            let v = 0; // Vendas
            let c = 0; // Compras

            db.forEach(item => {
                if(item.tipo === 'Venda') v += item.val;
                if(item.tipo === 'Compra') c += item.val;

                const badgeClass = item.tipo === 'Venda' ? 'badge-venda' : (item.tipo === 'Compra' ? 'badge-compra' : 'badge-troca');

                tbody.innerHTML += `
                    <tr>
                        <td><span class="badge ${badgeClass}">${item.tipo}</span></td>
                        <td style="color: #eee">${item.desc}</td>
                        <td style="font-weight: 600">R$ ${item.val.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                        <td><button class="btn-delete" onclick="deleteItem(${item.id})"><i class="fa-solid fa-trash-can"></i></button></td>
                    </tr>
                `;
            });

            const saldo = v - c;
            
            document.getElementById('dash-lucro').innerText = `R$ ${v.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('dash-perda').innerText = `R$ ${c.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            
            const saldoEl = document.getElementById('dash-saldo');
            saldoEl.innerText = `R$ ${saldo.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            
            // Lógica de Cor Conforme Ganhos/Perdas
            if(saldo > 0) {
                saldoEl.className = "value gain";
            } else if(saldo < 0) {
                saldoEl.className = "value loss";
            } else {
                saldoEl.className = "value";
            }
        }
    </script>
</body>
</html>
