<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineTeca - Premium</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { 
            getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, 
            onAuthStateChanged, signOut, sendPasswordResetEmail, GoogleAuthProvider, signInWithPopup 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB46-sCSiJ1HSMARLY1aBgECu2yxnOKYSQ",
            authDomain: "cineteca-8f89c.firebaseapp.com",
            projectId: "cineteca-8f89c",
            storageBucket: "cineteca-8f89c.firebasestorage.app",
            messagingSenderId: "944562373253",
            appId: "1:944562373253:web:1ba79111e58d2ec44e5fec",
            measurementId: "G-TBEK0XKKBS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const videosCol = collection(db, "videos");

        const EMAIL_ADMIN = "luisff05.jua@gmail.com";

        // --- LOADER (5s) ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 1000);
            }, 5000); 
        });

        // --- AUTENTICAÇÃO ---
        window.handleAuth = async (mode) => {
            const email = document.getElementById(mode === 'signup' ? 'user-reg-email' : 'auth-email').value;
            const pass = document.getElementById(mode === 'signup' ? 'user-reg-pass' : 'auth-pass').value;
            
            if(!email || !pass) return alert("Preencha e-mail e senha!");

            try {
                if(mode === 'signup') await createUserWithEmailAndPassword(auth, email, pass);
                else await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) {
                // Mensagens amigáveis para erros
                if (e.code === 'auth/invalid-credential') alert("E-mail ou senha incorretos. Tente novamente.");
                else if (e.code === 'auth/user-not-found') alert("Usuário não encontrado.");
                else if (e.code === 'auth/wrong-password') alert("Senha incorreta!");
                else alert("Erro: " + e.message);
            }
        };

        window.loginGoogle = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (e) {
                alert("Erro ao entrar com Google: " + e.message);
            }
        };

        window.resetPassword = async () => {
            const email = document.getElementById('auth-email').value;
            if(!email) return alert("Digite seu e-mail no campo acima para receber o link de redefinição.");
            try {
                await sendPasswordResetEmail(auth, email);
                alert("E-mail de redefinição enviado! Verifique sua caixa de entrada.");
            } catch (e) {
                alert("Erro: " + e.message);
            }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            const btnAdmin = document.getElementById('btn-admin');
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                btnAdmin.style.display = (user.email === EMAIL_ADMIN) ? 'inline-block' : 'none';
                renderLibrary();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-content').style.display = 'none';
            }
        });

        // --- VÍDEOS ---
        window.saveVideo = async () => {
            const title = document.getElementById('vTitle').value;
            const thumb = document.getElementById('vThumb').value;
            const type = document.getElementById('vType').value;
            let finalUrl = "";

            if(type === 'file') {
                const file = document.getElementById('vFile').files[0];
                if(!file) return alert("Selecione o vídeo!");
                finalUrl = URL.createObjectURL(file);
            } else {
                const url = document.getElementById('vUrl').value;
                finalUrl = url.replace("watch?v=", "embed/");
            }

            await addDoc(videosCol, { title, thumb, url: finalUrl, videoType: type, createdAt: new Date() });
            document.getElementById('adminModal').style.display = 'none';
        };

        function renderLibrary() {
            onSnapshot(query(videosCol, orderBy("createdAt", "desc")), (snapshot) => {
                const shelf = document.getElementById('shelf');
                shelf.innerHTML = "";
                snapshot.forEach((doc) => {
                    const v = doc.data();
                    shelf.innerHTML += `
                        <div class="video-card" onclick="openPlayer('${v.url}', '${v.videoType}')">
                            <img src="${v.thumb || 'https://via.placeholder.com/300x160/222/fff?text=CineTeca'}">
                            <h3>${v.title}</h3>
                        </div>`;
                });
            });
        }

        window.openPlayer = (url, type) => {
            const target = document.getElementById('playerTarget');
            target.innerHTML = (type === 'file') 
                ? `<video src="${url}" controls autoplay style="width:100%"></video>`
                : `<iframe src="${url}" frameborder="0" allowfullscreen autoplay></iframe>`;
            document.getElementById('playerModal').style.display = 'flex';
        };
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { background: #141414; color: white; }

        /* LOADER */
        #loader { position: fixed; width: 100%; height: 100vh; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: 1s; }
        .loader-logo { font-size: 3.5rem; font-weight: bold; color: #E50914; margin-bottom: 25px; animation: pulse 2s infinite; }
        .netflix-spinner { width: 45px; height: 45px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #E50914; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }

        /* AUTH */
        #auth-screen { height: 100vh; display: flex; justify-content: center; align-items: center; background: #000; }
        .auth-box { background: rgba(20,20,20,0.98); padding: 40px; border-radius: 8px; width: 400px; border: 1px solid #333; text-align: center; }
        .auth-box h2 { text-align: left; margin-bottom: 20px; }

        /* BOTÕES */
        input { width: 100%; padding: 12px; margin: 10px 0; background: #333; border: none; color: white; border-radius: 4px; }
        .btn-red { background: #E50914; color: white; border: none; padding: 12px; cursor: pointer; width: 100%; font-weight: bold; border-radius: 4px; margin-top: 10px; }
        .btn-google { background: white; color: #333; border: none; padding: 10px; cursor: pointer; width: 100%; font-weight: bold; border-radius: 4px; margin-top: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-link { background: none; border: none; color: #777; cursor: pointer; font-size: 0.85rem; margin-top: 15px; text-decoration: underline; }

        /* APP */
        header { padding: 15px 4%; display: flex; justify-content: space-between; align-items: center; background: #000; position: fixed; width: 100%; z-index: 100; }
        .logo { color: #E50914; font-size: 1.8rem; font-weight: bold; }
        .video-container { display: flex; gap: 15px; overflow-x: auto; padding: 120px 4% 20px; }
        .video-card { min-width: 280px; cursor: pointer; transition: 0.3s; }
        .video-card:hover { transform: scale(1.05); }
        .video-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 4px; }

        .modal, .player-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        iframe, video { width: 90%; aspect-ratio: 16/9; max-width: 1000px; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-logo">CineTeca</div>
        <div class="netflix-spinner"></div>
    </div>

    <div id="auth-screen">
        <div class="auth-box" id="login-section">
            <h2>Entrar</h2>
            <input type="email" id="auth-email" placeholder="E-mail">
            <input type="password" id="auth-pass" placeholder="Senha">
            <button class="btn-red" onclick="handleAuth('login')">Acessar</button>
            
            <button class="btn-google" onclick="loginGoogle()">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Entrar com Google
            </button>

            <button class="btn-link" onclick="resetPassword()">Esqueci minha senha</button>
            <p style="margin-top:20px; font-size:0.85rem; color:#777">Novo por aqui? <b style="color:white; cursor:pointer" onclick="document.getElementById('login-section').style.display='none'; document.getElementById('register-section').style.display='block'">Criar conta</b></p>
        </div>

        <div class="auth-box" id="register-section" style="display:none">
            <h2>Criar Conta</h2>
            <input type="email" id="user-reg-email" placeholder="Seu E-mail">
            <input type="password" id="user-reg-pass" placeholder="Crie uma Senha">
            <button class="btn-red" onclick="handleAuth('signup')">Registrar</button>
            <p style="margin-top:20px; font-size:0.85rem; color:#777" onclick="location.reload()" style="cursor:pointer">Já tenho conta. <b>Voltar</b></p>
        </div>
    </div>

    <div id="app-content" style="display: none;">
        <header>
            <div class="logo">CineTeca</div>
            <div>
                <button id="btn-admin" onclick="document.getElementById('adminModal').style.display='flex'" style="display:none; background:#333; border:none; color:white; padding:8px 15px; border-radius:4px; cursor:pointer; font-weight:bold">PAINEL ADM</button>
                <button onclick="logout()" style="background:none; border:none; color:#777; margin-left:15px; cursor:pointer">Sair</button>
            </div>
        </header>
        <div class="video-container" id="shelf"></div>
    </div>

    <div id="adminModal" class="modal">
        <div class="auth-box">
            <h3>Gerenciar CineTeca</h3>
            <input type="text" id="vTitle" placeholder="Título">
            <input type="text" id="vThumb" placeholder="URL da Capa">
            <select id="vType" onchange="document.getElementById('div-url').style.display=this.value==='link'?'block':'none'; document.getElementById('div-file').style.display=this.value==='file'?'block':'none';">
                <option value="link">Link (YouTube)</option>
                <option value="file">Galeria (Local)</option>
            </select>
            <div id="div-url"><input type="text" id="vUrl" placeholder="Link do vídeo"></div>
            <div id="div-file" style="display:none"><input type="file" id="vFile" accept="video/*"></div>
            <button class="btn-red" onclick="saveVideo()">Publicar</button>
            <button onclick="document.getElementById('adminModal').style.display='none'" class="btn-link">Fechar</button>
        </div>
    </div>

    <div id="playerModal" class="player-modal" onclick="this.style.display='none'; document.getElementById('playerTarget').innerHTML=''">
        <div id="playerTarget" style="width:100%; display:flex; justify-content:center"></div>
    </div>

</body>
</html>
